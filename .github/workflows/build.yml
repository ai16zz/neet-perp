name: Build NEET Perp Protocol

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-stable-v2-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Solana CLI v1.18.26 (Anza)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v1.18.26/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          $HOME/.local/share/solana/install/active_release/bin/solana --version

      - name: Install Anchor CLI v0.30.1 (without --locked to get compat deps)
        run: |
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli --force
          anchor --version

      - name: anchor build
        run: |
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          anchor build 2>&1 | tee build.log
          echo "--- last 10 lines ---"
          tail -10 build.log

      - name: Show compile errors
        if: always()
        run: grep -E "^error" build.log | head -20 || echo "No errors"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload .so binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: program-binaries
          path: target/deploy/*.so
          if-no-files-found: warn
