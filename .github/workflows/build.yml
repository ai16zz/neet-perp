name: Build NEET Perp Protocol
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-stable-solana3-${{ hashFiles('**/Cargo.toml') }}

      - name: Install Solana CLI v3.1.12 (Agave - platform-tools v1.52, Rust 1.89)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.12/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          $HOME/.local/share/solana/install/active_release/bin/solana --version

      - name: Install Anchor CLI v0.30.1
        run: |
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli --locked --force
          anchor --version

      - name: Remove stale Cargo.lock (if any)
        run: rm -f Cargo.lock

      - name: anchor build
        run: |
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          set -o pipefail
          anchor build 2>&1 | tee build.log

      - name: Show compile errors
        if: always()
        run: grep -E "^error" build.log | head -30 || echo "No errors found"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload .so binaries
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: program-binaries
          path: target/deploy/*.so
          if-no-files-found: warn
